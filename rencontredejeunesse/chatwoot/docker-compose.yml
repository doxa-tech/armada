# stack name: rj_chatwoot

version: '3'

services:
  rails:
    # rails runs on port 3000
    image: chatwoot/chatwoot:latest
    volumes:
      - chatwootDataVol1:/app/storage
    networks:
      - internal
      - public
    depends_on:
      - redis
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      FRONTEND_URL: https://support.rencontredejeunesse.ch
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://chatwoot:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/chatwoot
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}

    entrypoint: docker/entrypoints/rails.sh
    command: ['sh', '-c', 'bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0']
    restart: always
    deploy:
      mode: replicated
      replicas: 1
      labels:
        # rails
        - traefik.http.routers.rj_chatwoot_rails.rule=Host(`support.rencontredejeunesse.ch`) || Host(`www.support.rencontredejeunesse.ch`)
        - traefik.http.routers.rj_chatwoot_rails.entrypoints=websecure
        - traefik.http.routers.rj_chatwoot_rails.tls.certresolver=leresolver
        - traefik.http.services.rj_chatwoot_rails.loadbalancer.server.port=3000
        - traefik.http.routers.rj_chatwoot_rails.middlewares=redirect-www

  sidekiq:
    image: chatwoot/chatwoot:latest
    networks:
      - internal
    depends_on:
      - redis
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      FRONTEND_URL: https://support.rencontredejeunesse.ch
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://chatwoot:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/chatwoot
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_DOMAIN: ${SMTP_DOMAIN}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}

    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - traefik.enable=false

  redis:
    # redis runs on port 6379
    networks:
      - internal
    image: redis:alpine
    restart: always
    command: ["sh", "-c", "redis-server --requirepass ${REDIS_PASSWORD}"]
    volumes:
      - redisDataVol1:/data/redis:/data
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - traefik.enable=false

networks:
  public:
    external: true
  internal:

volumes:
  redisDataVol1:
  chatwootDataVol1: